server {
    listen 443 ssl;
    server_name local.remotecontrol.rs;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # API proxy to C server
    location /api/ {
        proxy_pass http://rc-server:7481/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # Admin panel proxy to C server
    location /admin/ {
        proxy_pass http://rc-server:7481/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # PgAdmin proxy
    location /pgadmin/ {
        proxy_pass http://rc-pgadmin:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Script-Name /pgadmin;
        proxy_redirect off;
    }

    # Email activation endpoint (user-friendly URL)
    location /activate/ {
        proxy_pass http://rc-server:7481/api/activate/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check
    location /health {
        proxy_pass http://rc-server:7481/health;
    }

    # Default
    location / {
        return 404 '{"error": "not_found"}';
        add_header Content-Type application/json;
    }
}
